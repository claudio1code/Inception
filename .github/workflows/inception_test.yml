name: Teste de Infraestrutura Inception

on:
  push:
    branches : ["main"]
  workflow_dispatch:

jobs:
  testar-projeto:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📥 Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 🔐 Criar arquivo .env temporário
        run: |
          cat << 'EOF' > srcs/.env
          DOMAIN_NAME=clados-s.42.fr
          MYSQL_DATABASE=wordpress
          MYSQL_USER=wp_user
          MYSQL_PASSWORD=wp_pass
          MYSQL_ROOT_PASSWORD=root_pass
          WORDPRESS_DB_HOST=mariadb
          WORDPRESS_DB_NAME=wordpress
          WORDPRESS_DB_USER=wp_user
          WORDPRESS_DB_PASSWORD=wp_pass
          WORDPRESS_ADMIN_USER=claudio_admin
          WORDPRESS_ADMIN_PASSWORD=admin_pass
          WORDPRESS_ADMIN_EMAIL=clados-s@42.fr
          WORDPRESS_USER=claudio_user
          WORDPRESS_USER_PASSWORD=user_pass
          WORDPRESS_USER_EMAIL=user@42.fr
          DB_DATA_PATH=/home/clados-s/data/mariadb
          WP_DATA_PATH=/home/clados-s/data/wordpress
          EOF

          mkdir -p secrets
          echo "root_pass" > secrets/db_root_password.txt
          echo "wp_pass" > secrets/db_password.txt
          echo "admin_pass" > secrets/credentials.txt
          echo "guest_pass" > secrets/guest_password.txt

      - name: 🚀 Construir arquitetura
        run: make

      - name: 🐳 Verificar Contêineres
        run: docker ps -a

      - name: 🔒 Testar Segurança do Nginx (Portas e TLS)
        run: |
          echo "Aguardando 15 segundos para a geração do certificado e boot completo..."
          sleep 15
          
          # 1. Ensinar o robô a resolver o teu domínio para a rede local (localhost)
          echo "127.0.0.1 clados-s.42.fr" | sudo tee -a /etc/hosts
          
          echo "========================================"
          echo "Teste 1.1: Tentar aceder à porta 80 (HTTP)"
          if curl -I -s -m 5 http://clados-s.42.fr; then
            echo "❌ ERRO: A porta 80 está a responder. Ela tem de estar bloqueada!"
            exit 1
          else
            echo "✅ SUCESSO: Porta 80 inacessível."
          fi
          
          echo "========================================"
          echo "Teste 1.2: Acesso com HTTPS"
          if curl -I -k -s -f https://clados-s.42.fr; then
            echo "✅ SUCESSO: HTTPS está a funcionar corretamente (TLSv1.2/1.3)."
          else
            echo "❌ ERRO: Falha ao conectar via HTTPS."
            exit 1
          fi
          
          echo "========================================"
          echo "Teste 1.3: Forçar protocolo obsoleto (TLS 1.1)"
          if curl -I -k -s -m 5 --tls-max 1.1 https://clados-s.42.fr; then
            echo "❌ ERRO: O servidor aceitou TLS 1.1. Ele tem de rejeitar!"
            exit 1
          else
            echo "✅ SUCESSO: Conexão com TLS 1.1 recusada com sucesso."
          fi
      - name: 🛡️ Testar Isolamento e Segurança do Banco de Dados
        run: |
          echo "========================================"
          echo "Teste 2: Isolamento da Rede (Porta 3306 no Host)"
          # O netcat (nc) tem de falhar. Se tiver sucesso, a porta está exposta indevidamente.
          if nc -zv 127.0.0.1 3306 2>/dev/null; then
            echo "❌ ERRO: A porta 3306 do MariaDB está exposta no host! Violação de isolamento."
            exit 1
          else
            echo "✅ SUCESSO: O MariaDB está perfeitamente isolado. Conexão externa recusada."
          fi

          echo "========================================"
          echo "Teste 4: Segurança do Root no MariaDB"
          # Tentar aceder ao mysql sem password como root diretamente dentro do contentor. Tem de falhar.
          if docker exec mariadb mysql -u root 2>/dev/null; then
            echo "❌ ERRO: Foi possível aceder ao root do MariaDB sem password!"
            exit 1
          else
            echo "✅ SUCESSO: Acesso root anónimo negado. O banco de dados está trancado."
          fi
          
      - name: Testar Persistencia de Dados (Volumes)
        run: |
          echo "========================================"
          echo "Teste 3: Sobrevivência de Dados aos Volumes"
          
          echo "A injetar um artigo de teste na base de dados via WP-CLI..."
          docker exec wordpress wp post create --post_title="Teste de Persistencia 42" --post_content="Este artigo tem de sobreviver." --post_status=publish --allow-root
          
          echo "A destruir a infraestrutura (make down)..."
          make down
          
          echo "A verificar se os contentores foram removidos..."
          if [ "$(docker ps -q)" ]; then
            echo "ERRO: O make down não parou todos os contentores!"
            exit 1
          fi
          
          echo "A reconstruir a infraestrutura..."
          make
          
          echo "Aguardar 15 segundos para o arranque do MariaDB e WordPress..."
          sleep 15
          
          echo "A procurar o artigo injetado..."
          if docker exec wordpress wp post list --field=post_title --allow-root | grep -q "Teste de Persistencia 42"; then
            echo "SUCESSO: O artigo sobreviveu à destruição. Os volumes (Bind Mounts) estao perfeitos!"
          else
            echo "ERRO: O artigo desapareceu. Falha grave na persistencia de dados."
            exit 1
          fi
